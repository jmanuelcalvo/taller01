- name: 01 - Provision VMware guest and add to dynamic inventory
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vcenter_hostname: your_vcenter.example.com
    vcenter_username: your_vcenter_user
    vcenter_password: your_vcenter_password
    vm_name: webapp-rhel9-01
    vm_template: RHEL9-Golden-Template
    vm_datacenter: YourDatacenter
    vm_cluster: YourCluster
    vm_folder: /YourDatacenter/vm/Ansible_VMs
    vm_network: VM Network
    vm_ip: 192.168.1.101
    vm_gateway: 192.168.1.1
    vm_dns_servers:
      - 8.8.8.8
      - 8.8.4.4
    vm_cpu: 2
    vm_memory_mb: 4096
    vm_disk_size_gb: 50
    initial_ssh_user: root
    initial_ssh_private_key_file: ~/.ssh/id_rsa
  tasks:
    - name: Provision and power on VMware guest from template
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        name: "{{ vm_name }}"