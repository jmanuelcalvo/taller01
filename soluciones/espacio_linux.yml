---
- name: "Linux: Health Check & Provisioning"
  hosts: os_linux
  become: yes
  
  vars:
    target_partition: "/"
    min_space_gb: 5

  tasks:
    - name: "Validar espacio en disco (Silencioso)"
      ansible.builtin.assert:
        that:
          - item.size_available > (min_space_gb | int * 1024**3)
        fail_msg: "ERROR: La partición {{ target_partition }} no cumple con el mínimo."
      loop: "{{ ansible_mounts }}"
      loop_control:
        label: "{{ item.mount }}"
      when: item.mount == target_partition
      # Oculta el JSON masivo de 'ansible_mounts' en el log
      no_log: true
      register: disk_result

    - name: "📊 REPORTE DE ALMACENAMIENTO"
      ansible.builtin.debug:
        msg: 
          - "==========================================="
          - "🖥️ SERVIDOR: {{ inventory_hostname | upper }}"
          - "-------------------------------------------"
          - "📌 Partición: {{ target_partition }}"
          - "💾 Disponible: {{ (item.size_available / 1024**3) | round(2) }} GB"
          - "📉 Requerido: {{ min_space_gb }} GB"
          - "✅ ESTADO: ESPACIO SUFICIENTE"
          - "==========================================="
      loop: "{{ ansible_mounts }}"
      loop_control:
        label: "{{ inventory_hostname }}"
      when: 
        - item.mount == target_partition
        - not disk_result.failed | default(false)