---
- name: "Linux: Health Check & Provisioning"
  hosts: linux_servers
  become: yes
  
  vars:
    target_partition: "/"
    min_space_gb: 5

  tasks:
    - name: "Validar espacio en disco"
      ansible.builtin.assert:
        that:
          - item.size_available > (min_space_gb | int * 1024**3)
        fail_msg: "ERROR: La partición {{ target_partition }} está por debajo del límite."
        success_msg: "VALIDADO: Espacio suficiente en {{ target_partition }}."
      loop: "{{ ansible_mounts }}"
      # ESTO ES LA CLAVE: Solo imprime el punto de montaje en el log, no todo el JSON
      loop_control:
        label: "{{ item.mount }}"
      when: item.mount == target_partition
      register: disk_result

    - name: "📊 Resumen de Almacenamiento"
      ansible.builtin.debug:
        msg: 
          - "-------------------------------------------"
          - "📌 Partición verificada: {{ target_partition }}"
          - "💾 Espacio disponible: {{ (item.size_available / 1024**3) | round(2) }} GB"
          - "✅ Estado: Operativo"
          - "-------------------------------------------"
      loop: "{{ ansible_mounts }}"
      loop_control:
        label: "{{ item.mount }}"
      when: item.mount == target_partition