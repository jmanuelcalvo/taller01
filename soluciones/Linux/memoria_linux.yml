---
- name: "Consumo de Memoria Offline en RHEL - Reporte Corregido"
  hosts: os_linux
  become: yes
  vars:
    # Configuración de la prueba
    mem_a_consumir_mb: 500
    duracion_segundos: 30

  tasks:
    - name: "1. Mostrar estado INICIAL (usando diccionario de memoria)"
      ansible.builtin.debug:
        msg:
          - "-------------------------------------------"
          - "ESTADO DE MEMORIA: INICIAL"
          - "-------------------------------------------"
          - "Total RAM:      {{ ansible_memory_mb.real.total }} MB"
          - "RAM Libre:      {{ ansible_memory_mb.real.free }} MB"
          - "-------------------------------------------"

    - name: "2. Validar si hay suficiente RAM libre"
      # Usamos 'free' en lugar de 'available' para asegurar compatibilidad total
      ansible.builtin.assert:
        that:
          - ansible_memory_mb.real.free > mem_a_consumir_mb
        fail_msg: "¡Error! Intentas consumir {{ mem_a_consumir_mb }}MB pero solo tienes {{ ansible_memory_mb.real.free }}MB libres."

    - name: "3. Ejecutar consumo de memoria (Python)"
      ansible.builtin.shell: >
        python3 -c "import time; 
        a = bytearray(1024 * 1024 * {{ mem_a_consumir_mb }}); 
        time.sleep({{ duracion_segundos }})"
      async: "{{ duracion_segundos + 5 }}"
      poll: 0
      register: stress_job

    - name: "Esperar un momento para el cambio"
      ansible.builtin.pause:
        seconds: 5

    - name: "4. Forzar actualización de datos de memoria"
      ansible.builtin.setup:
        filter: "ansible_memory_mb"

    - name: "5. Mostrar reporte FINAL"
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "       REPORTE DE CONSUMO ACTIVO"
          - "==========================================="
          - " RAM TOTAL:        {{ ansible_memory_mb.real.total }} MB"
          - " RAM AHORA LIBRE:  {{ ansible_memory_mb.real.free }} MB"
          - "-------------------------------------------"
          - " PROCESO:          Consumiendo {{ mem_a_consumir_mb }} MB"
          - "==========================================="