---
- name: "Consumo de Memoria Offline en RHEL - Reporte Limpio"
  hosts: os_linux
  become: yes
  vars:
    # Configuración de la prueba
    mem_a_consumir_mb: 1024
    duracion_segundos: 60

  tasks:
    - name: "1. Obtener y mostrar estado INICIAL"
      ansible.builtin.debug:
        msg:
          - "-------------------------------------------"
          - "ESTADO DE MEMORIA: INICIAL"
          - "-------------------------------------------"
          - "Total RAM:      {{ ansible_memtotal_mb }} MB"
          - "RAM Libre:      {{ ansible_memfree_mb }} MB"
          - "RAM Disponible: {{ ansible_memavailable_mb }} MB"
          - "-------------------------------------------"

    - name: "2. Validar si hay suficiente RAM disponible"
      ansible.builtin.assert:
        that:
          - ansible_memavailable_mb > mem_a_consumir_mb
        fail_msg: "¡Error! Intentas consumir {{ mem_a_consumir_mb }}MB pero solo tienes {{ ansible_memavailable_mb }}MB libres."
        success_msg: "Validación exitosa. Iniciando proceso..."

    - name: "3. Ejecutar consumo de memoria (Proceso Python)"
      # Este comando reserva la RAM exacta y se queda esperando
      ansible.builtin.shell: >
        python3 -c "import time; 
        print('Iniciando...'); 
        a = bytearray(1024 * 1024 * {{ mem_a_consumir_mb }}); 
        time.sleep({{ duracion_segundos }})"
      async: "{{ duracion_segundos + 5 }}"
      poll: 0
      register: stress_job

    - name: "Esperar 5 segundos para que el sistema registre el cambio"
      ansible.builtin.pause:
        seconds: 5

    - name: "4. Recolectar datos actualizados"
      ansible.builtin.setup:
        filter: "ansible_mem*"

    - name: "5. Mostrar reporte FINAL legible"
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "       REPORTE DE CONSUMO ACTIVO"
          - "==========================================="
          - " RAM TOTAL:        {{ ansible_memtotal_mb }} MB"
          - " RAM AHORA LIBRE:  {{ ansible_memfree_mb }} MB"
          - " RAM DISPONIBLE:   {{ ansible_memavailable_mb }} MB"
          - "-------------------------------------------"
          - " PROCESO:          Consumiendo {{ mem_a_consumir_mb }} MB"
          - " TIEMPO RESTANTE:  {{ duracion_segundos }} segundos"
          - "==========================================="

    - name: "Nota final"
      ansible.builtin.debug:
        msg: "El consumo se liberará automáticamente cuando el tiempo termine."