---
- name: Reporte de Disponibilidad de Servicios RHEL
  hosts: all
  gather_facts: false
  vars:
    # Puedes definir una lista de servicios si deseas reportar varios a la vez
    servicios_a_validar:
      - httpd
      - sshd
      - chronyd

  tasks:
    - name: Obtener información técnica de los servicios
      ansible.builtin.service_facts:

    - name: Generar Reporte de Estado en Pantalla
      ansible.builtin.debug:
        msg: |
          --------------------------------------------------
          REPORTE DE ESTADO DE SERVICIO: {{ item }}
          --------------------------------------------------
          SISTEMA DESTINO : {{ inventory_hostname }}
          ESTADO ACTUAL   : {{ (ansible_facts.services[item + '.service'].state | default('NOT FOUND')) | upper }}
          AUTO-INICIO     : {{ (ansible_facts.services[item + '.service'].status | default('N/A')) | capitalize }}
          --------------------------------------------------
          RESULTADO       : {{ '✅ DISPONIBLE' if (ansible_facts.services[item + '.service'].state | default('') == 'running') else '❌ CRÍTICO / DOWN' }}
          --------------------------------------------------
      loop: "{{ servicios_a_validar }}"
      when: "item + '.service' in ansible_facts.services"

    - name: Alerta de servicios no instalados
      ansible.builtin.debug:
        msg: "⚠️ EL SERVICIO '{{ item }}' NO SE ENCUENTRA INSTALADO EN ESTE NODO."
      loop: "{{ servicios_a_validar }}"
      when: "item + '.service' not in ansible_facts.services"