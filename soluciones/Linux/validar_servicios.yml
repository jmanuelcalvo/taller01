---
- name: Reporte de Disponibilidad de Servicios RHEL
  hosts: all
  gather_facts: false
  vars:
    # Valor por defecto si el survey llega vacío para evitar errores
    servicios_a_validar: "sshd"

  tasks:
    - name: Recolectar información de los servicios del sistema
      ansible.builtin.service_facts:

    - name: Generar Reporte de Estado en Pantalla
      ansible.builtin.debug:
        msg: |
          --------------------------------------------------
          DETALLE DEL SERVICIO: {{ item | trim }}
          --------------------------------------------------
          SERVIDOR        : {{ inventory_hostname }}
          ESTADO ACTUAL   : {{ (ansible_facts.services[item | trim + '.service'].state | default('NO INSTALADO')) | upper }}
          AUTO-INICIO     : {{ (ansible_facts.services[item | trim + '.service'].status | default('N/A')) | capitalize }}
          --------------------------------------------------
          RESULTADO       : {{ '✅ DISPONIBLE' if (ansible_facts.services[item | trim + '.service'].state | default('') == 'running') else '❌ CRÍTICO / DOWN' }}
          --------------------------------------------------
      # Convierte el string del Survey en una lista ejecutable
      loop: "{{ servicios_a_validar.split(',') }}"
      # Se ejecuta solo si el servicio existe en el sistema
      when: "(item | trim) + '.service' in ansible_facts.services"

    - name: Reportar servicios faltantes
      ansible.builtin.debug:
        msg: "⚠️ ATENCIÓN: El servicio '{{ item | trim }}' no existe en {{ inventory_hostname }}"
      loop: "{{ servicios_a_validar.split(',') }}"
      when: "(item | trim) + '.service' not in ansible_facts.services"