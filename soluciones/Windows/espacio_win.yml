---
- name: "Windows: Storage Health Check"
  hosts: os_windows
  gather_facts: no
  
  vars:
    target_drive: "C:"
    min_disk_gb: 10

  tasks:
    - name: "Consultar espacio en disco (Silencioso)"
      ansible.windows.win_powershell:
        script: |
          $drive = Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='{{ target_drive }}'"
          $freeGB = [math]::Round($drive.FreeSpace / 1GB, 2)
          return $freeGB
      register: disk_info
      no_log: true # Mantenemos esto oculto para no ver el JSON de PowerShell

    - name: "Validar límite de disco"
      ansible.builtin.assert:
        that: 
          - disk_info.output[0] > (min_disk_gb | float)
        # QUITAMOS el no_log de aquí para que veas este mensaje si falla:
        fail_msg: "❌ ERROR en {{ inventory_hostname }}: El disco {{ target_drive }} solo tiene {{ disk_info.output[0] }}GB (Mínimo requerido: {{ min_disk_gb }}GB)."
        success_msg: "✅ Espacio suficiente en {{ inventory_hostname }}"

    - name: "📊 REPORTE DE ALMACENAMIENTO WINDOWS"
      ansible.builtin.debug:
        msg: 
          - "==========================================="
          - "🖥️ SERVIDOR: {{ inventory_hostname | upper }}"
          - "-------------------------------------------"
          - "📌 UNIDAD: {{ target_drive }}"
          - "💾 DISPONIBLE: {{ disk_info.output[0] }} GB"
          - "📉 MÍNIMO REQUERIDO: {{ min_disk_gb }} GB"
          - "✅ ESTADO: OPERATIVO"
          - "==========================================="
      # Solo muestra el reporte bonito si la validación anterior pasó
      when: disk_info.output[0] > (min_disk_gb | float)